# --- 1. TYPOGRAPHY (Crisp & Readable) ---
font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono Bold
italic_font      JetBrainsMono Nerd Font Mono Italic
bold_italic_font JetBrainsMono Nerd Font Mono Bold Italic
fallback_fonts   NotoColorEmoji, DejaVuSansMono Nerd Font Mono
font_size        18.0

# Enable ligatures (e.g. != becomes ≠)
disable_ligatures never
font_features JetBrainsMonoNerdFont-Regular +liga +calt +dlig
# Legacy strategy makes text look thicker and sharper on dark backgrounds
text_composition_strategy legacy

# --- 2. THE "PERFECT" CURSOR (Locked In) ---
cursor_shape               beam
cursor_beam_thickness      1.5
cursor_blink_interval      0.5
cursor_trail               10
cursor_trail_decay         0.1 0.4
cursor_trail_start_threshold 0

# --- 3. GLASS WINDOW AESTHETICS ---
background_opacity         0.50
background_blur            50
dynamic_background_opacity yes
# 12px padding gives the text "room to breathe" away from the edges
window_padding_width       12
placement_strategy         center
hide_window_decorations    yes
confirm_os_window_close    0

# --- 4. LAYOUTS & BORDERS ---
enabled_layouts splits,stack
# When you split windows, the border is thin and matches your accent color
window_border_width        1.0pt
draw_minimal_borders       yes
active_border_color        #89b4fa
inactive_border_color      #45475a
# Slight fade on inactive windows helps focus
inactive_text_alpha        0.9

# --- 5. PERFORMANCE (Ultra-Smooth) ---
repaint_delay    2
input_delay      1
sync_to_monitor  no

# --- 6. POWERLINE TAB BAR ---
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_margin_height   8.0 0.0
# Bold font for the active tab makes it pop
active_tab_font_style   bold
inactive_tab_font_style normal

# --- 7. COLORS (Original Catppuccin Mocha) ---
foreground           #cdd6f4
background           #1e1e2e
selection_foreground #1e1e2e
selection_background #89b4fa

# Cursor Colors
cursor               #89b4fa
cursor_text_color    #1e1e2e

# URL Colors
url_color            #89dceb
url_style            curly

# Tab Colors
active_tab_foreground   #a6e3a1
active_tab_background   #1e1e2e
inactive_tab_foreground #6c7086
inactive_tab_background #181825
tab_bar_background      #181825

# The 16-Color Palette
color0  #45475a
color8  #585b70
color1  #f38ba8
color9  #f38ba8
color2  #a6e3a1
color10 #a6e3a1
color3  #f9e2af
color11 #f9e2af
color4  #89b4fa
color12 #89b4fa
color5  #cba6f7
color13 #cba6f7
color6  #89dceb
color14 #89dceb
color7  #bac2de
color15 #cdd6f4

# --- 8. MOUSE & UTILITY ---
mouse_hide_wait      3.0
copy_on_select       yes
detect_urls          yes
strip_trailing_spaces smart
# Clicking a link opens it immediately
open_url_with        default

# --- 9. KEYBINDINGS ---
kitty_mod ctrl+shift

# Essential Config Reload
map kitty_mod+f5 load_config_file

# Window Management (Splits)
map kitty_mod+enter new_window_with_cwd
map kitty_mod+w     close_window
map kitty_mod+]     next_window
map kitty_mod+[     previous_window
# Toggle "Cinema Mode" (Fullscreen)
map kitty_mod+f11   toggle_fullscreen

# Tab Management
map kitty_mod+t     new_tab_with_cwd
map kitty_mod+right next_tab
map kitty_mod+left  previous_tab

# --- 10. ADVANCED ---
shell /usr/bin/fish -i
editor nano
allow_remote_control yes
listen_on unix:@mykitty
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
